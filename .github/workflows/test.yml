name: Test Docker Build and Run

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker-build-run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t backend-test .

      - name: Run Docker Container (Sanity Check)
        run: |
          docker run -d -p 4000:4000 --name backend-test-container backend-test
          sleep 10  # wait for container to start

      - name: Check Container Logs
        run: docker logs backend-test-container

      - name: Health Check (Port 4000)
        run: |
          curl --fail http://localhost:4000 || (echo "Health check failed" && exit 1)

      - name: Clean Up
        run: |
          docker stop backend-test-container
          docker rm backend-test-container
