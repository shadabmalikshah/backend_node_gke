env:
  - name: NODE_ENV
    value: "production"
  - name: GOOGLE_APPLICATION_CREDENTIALS
    value: "/secrets/firebase_key.json"
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: backend-secrets
        key: JWT_SECRET

volumeMounts:
  - name: firebase-key
    mountPath: /secrets
    readOnly: true

volumes:
  - name: firebase-key
    secret:
      secretName: firebase-key
